name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Generate Android platform folder
        working-directory: app
        run: flutter create --platforms=android --org com.pier36 .

      - name: Fetch packages
        working-directory: app
        run: flutter pub get

      - name: Inject OAuth deep-link into Android manifest
        working-directory: app
        run: python3 tool/inject_deeplink.py

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Stage APK
        working-directory: app
        run: |
          mkdir -p ../dist
          cp build/app/outputs/flutter-apk/app-release.apk ../dist/pier36-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pier 36 ${{ github.ref_name }}
          prerelease: true
          body: |
            Automated Android APK build for Pier 36 ${{ github.ref_name }}.

            - Connect your Supabase project in-app (Settings → Backend connection), then sign in with GitHub.
            - Feed runs on mock data until live persistence is wired.
            - **Debug-signed preview** — install via sideload; not for the Play Store.
          files: dist/pier36-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
